name: Build Android

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v7

      - name: Setup JDK 17
        uses: actions/setup-java@v5.4.0
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Android SDK/NDK
        uses: android-actions/setup-android@v4.0.1

      - name: Install Android packages
        run: |
          yes | sdkmanager --licenses

          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Cache Rust
        uses: actions/cache@v6.1.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            ~/src-tauri/target
          key: android-${{ hashFiles('src-tauri/Cargo.lock') }}

      - run: bun install --frozen-lockfile

      - name: Android signature
        run: |
          cd src-tauri/gen/android
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" > keystore.properties
          echo "password=${{ secrets.ANDROID_KEY_PASSWORD }}" >> keystore.properties
          base64 -d <<< "${{ secrets.ANDROID_KEY_BASE64 }}" > $RUNNER_TEMP/keystore.jks
          echo "storeFile=$RUNNER_TEMP/keystore.jks" >> keystore.properties

      - name: Build Tauri Android
        run: bun tauri android build --apk --split-per-abi --target ${{ matrix.rust_target }}

      - name: Collect artifacts
        run: |
          mkdir -p release

          find src-tauri/gen/android/app/build/outputs -type f \( -name "*.apk" -o -name "*.aab" \) -exec cp {} release/ \;

          ls -lah release

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_prefix }}
          path: release/*