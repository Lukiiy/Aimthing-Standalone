name: Build Android

on:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v7

      - uses: actions/checkout@v7
        with:
          repository: Lukiiy/Aimthing
          ref: main
          path: src

      - uses: oven-sh/setup-bun@v2.1.2

      - name: Setup JDK 17
        uses: actions/setup-java@v5.4.0
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Setup Android SDK/NDK
        uses: android-actions/setup-android@v4.0.1

      - name: Install Android packages
        run: |
          yes | sdkmanager --licenses

          sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android

      - name: Cache Rust
        uses: actions/cache@v6.1.0
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            src-tauri/target
          key: android-${{ hashFiles('src-tauri/Cargo.lock') }}

      - run: bun install --frozen-lockfile

      - run: bun tauri android init --ci

      - name: Build Tauri Android
        run: bun tauri android build --apk --split-per-abi

      - name: Collect artifacts
        run: |
          mkdir -p release

          find src-tauri/gen/android/app/build/outputs -type f \( -name "*.apk" -o -name "*.aab" \) -exec cp {} release/ \;

          ls -lah release

      - name: Sign APKs
        run: |
          echo "${{ secrets.ANDROID_KEY_BASE64 }}" | base64 -d > "$RUNNER_TEMP/keystore.jks"

          for apk in release/*.apk
          do
            apksigner sign --ks $RUNNER_TEMP/keystore.jks --ks-pass pass:${{ secrets.ANDROID_KEYSTORE_PASSWORD }} --key-pass pass:${{ secrets.ANDROID_KEY_PASSWORD }} --ks-key-alias "${{ secrets.ANDROID_KEY_ALIAS }}" "$apk"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          path: release/*